name: Build deeplink

on:
  push:
    branches: [main]
    paths:
      - 'HAPP/default.json'
      - 'scripts/build_deeplink.py'
      - '.github/workflows/build.yml'
  workflow_dispatch: {}

permissions:
  contents: write

# Serialize runs so concurrent triggers can't race on `git push` and produce
# a non-fast-forward failure mid-cleanup.
concurrency:
  group: build-deeplink-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    # Hard-restrict to main: workflow_dispatch lets anyone with actions:write
    # pick any ref. Since the job carries `contents: write`, an attacker who
    # could push a branch and dispatch on it would run arbitrary code on the
    # self-hosted runner with a write token. Push trigger is already main-only
    # via the path filter above.
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, linux, x64, bigipig-routing]
    timeout-minutes: 10
    steps:
      # Force checkout of main even when the dispatcher chose another ref,
      # so the job never executes code from an arbitrary branch.
      - uses: actions/checkout@v4
        with:
          ref: refs/heads/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Build deeplink
        run: |
          python scripts/build_deeplink.py \
            --input HAPP/default.json \
            --output HAPP/default.deeplink

      - name: Validate JSON parses cleanly
        run: python -c "import json; json.load(open('HAPP/default.json'))"

      - name: Validate deeplink format
        run: |
          # Prefix is 'add' (not 'onadd') — confirmed working with Happ client
          # and matches what scripts/build_deeplink.py emits.
          deeplink=$(cat HAPP/default.deeplink)
          case "$deeplink" in
            happ://routing/add/*) ;;
            *) echo "Invalid deeplink prefix: $deeplink" >&2; exit 1 ;;
          esac

      - name: Commit regenerated deeplink (if changed)
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if [ -z "$(git status --porcelain HAPP/default.deeplink)" ]; then
            echo 'deeplink already in sync, nothing to commit'
            exit 0
          fi
          git add HAPP/default.deeplink
          git commit -m 'chore(deeplink): rebuild from default.json'
          git push
